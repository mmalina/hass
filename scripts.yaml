volume_down_loop:
  alias: Volume Down Loop
  mode: single
  sequence:
  - action: script.turn_off
    data:
      entity_id: script.volume_up_loop
  - repeat:
      count: 20
      sequence:
      - action: media_player.volume_set
        entity_id: media_player.yamaha
        data_template:
          volume_level: '{{ state_attr(''media_player.yamaha'', ''volume_level'')
            - 0.02 }}'
      - delay:
          milliseconds: 50
volume_up_loop:
  alias: Volume Up Loop
  mode: single
  sequence:
  - action: script.turn_off
    data:
      entity_id: script.volume_down_loop
  - repeat:
      count: 20
      sequence:
      - action: media_player.volume_set
        entity_id: media_player.yamaha
        data_template:
          volume_level: '{{ state_attr(''media_player.yamaha'', ''volume_level'')
            + 0.02 }}'
      - delay:
          milliseconds: 50
yamaha_set_speaker:
  alias: Yamaha Set Speaker
  sequence:
  - action: rest_command.yamaha_set_speaker
    data:
      speaker: A
      enable: '{{speakerA}}'
  - action: rest_command.yamaha_set_speaker
    data:
      speaker: B
      enable: '{{speakerB}}'
apple_tv_sleep:
  alias: Apple TV Sleep
  sequence:
  - action: remote.send_command
    target:
      entity_id: remote.apple_tv
    data:
      delay_secs: 1
      command:
      - suspend
blinds_step_up:
  alias: Blinds Step Up
  sequence:
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind1', 'current_tilt_position') | int %}
        {% if cur < 35 %}35{% elif cur < 50 %}50{% elif cur < 65 %}65{% else %}100{% endif %}
    target:
      entity_id: cover.blind1
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind2', 'current_tilt_position') | int %}
        {% if cur < 35 %}35{% elif cur < 50 %}50{% elif cur < 65 %}65{% else %}100{% endif %}
    target:
      entity_id: cover.blind2
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind3', 'current_tilt_position') | int %}
        {% if cur < 35 %}35{% elif cur < 50 %}50{% elif cur < 65 %}65{% else %}100{% endif %}
    target:
      entity_id: cover.blind3
blinds_step_down:
  alias: Blinds Step Down
  sequence:
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind1', 'current_tilt_position') | int %}
        {% if cur > 65 %}65{% elif cur > 50 %}50{% elif cur > 35 %}35{% else %}0{% endif %}
    target:
      entity_id: cover.blind1
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind2', 'current_tilt_position') | int %}
        {% if cur > 65 %}65{% elif cur > 50 %}50{% elif cur > 35 %}35{% else %}0{% endif %}
    target:
      entity_id: cover.blind2
  - action: cover.set_cover_tilt_position
    data:
      tilt_position: >-
        {% set cur = state_attr('cover.blind3', 'current_tilt_position') | int %}
        {% if cur > 65 %}65{% elif cur > 50 %}50{% elif cur > 35 %}35{% else %}0{% endif %}
    target:
      entity_id: cover.blind3
blinds_base_position:
  alias: Blinds Base Position
  sequence:
  - parallel:
    - sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.blind1
      - wait_template: '{{ is_state_attr(''cover.blind1'', ''current_position'', 0) }}'
        timeout:
          minutes: 2
        continue_on_timeout: true
      - action: cover.set_cover_tilt_position
        data:
          tilt_position: 100
        target:
          entity_id: cover.blind1
    - sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.blind2
      - wait_template: '{{ is_state_attr(''cover.blind2'', ''current_position'', 0) }}'
        timeout:
          minutes: 2
        continue_on_timeout: true
      - action: cover.set_cover_tilt_position
        data:
          tilt_position: 100
        target:
          entity_id: cover.blind2
    - sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.blind3
      - wait_template: '{{ is_state_attr(''cover.blind3'', ''current_position'', 0) }}'
        timeout:
          minutes: 2
        continue_on_timeout: true
      - action: cover.set_cover_tilt_position
        data:
          tilt_position: 100
        target:
          entity_id: cover.blind3
